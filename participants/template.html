<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YOUR NAME — Git & GitHub Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../workshop.css">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
/* ✏️ Change this to your favourite color */
:root { --accent: #2438E0; }

.pcard{background:#FBF6EA;border:2px solid var(--accent);border-radius:12px;box-shadow:4px 4px 0 var(--accent);padding:36px}
.hero-image{width:100%;border-radius:8px;margin-bottom:20px;display:block}
.pname{font-size:28px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
.prole{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);margin-bottom:26px}
.divider{border:none;border-top:2px solid rgba(23,21,15,.1);margin:22px 0}
.field{margin-bottom:20px}
.field label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.field p{font-size:15px;color:var(--ink);line-height:1.6;font-weight:500}
.pfooter{margin-top:24px;font-family:'Space Mono',monospace;font-size:11px;color:rgba(23,21,15,.3);text-align:center}
</style>
</head>
<body>
<div class="wrap"><div class="shell" style="max-width:560px">
<a class="back" href="index.html">← back to team</a>

<div class="pcard">

  <!-- ✏️ Replace with your own image or gif URL -->
  <img src="https://media1.tenor.com/m/ekC8G7GhYhwAAAAd/test-nice.gif" alt="hero" class="hero-image">

  <!-- ✏️ Your name -->
  <div class="pname">Your Name</div>

  <!-- ✏️ Your role -->
  <div class="prole">// Your Role</div>

  <hr class="divider">

  <div class="field">
    <label>About</label>
    <!-- ✏️ A sentence or two about yourself -->
    <p>Tell us something about yourself.</p>
  </div>

  <div class="field">
    <label>Fun fact</label>
    <!-- ✏️ Something fun or surprising -->
    <p>Something people might not know about you.</p>
  </div>


</div>

<div class="pfooter">made during the git workshop</div>
</div></div>
</body>
</html>
