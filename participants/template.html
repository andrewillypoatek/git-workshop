<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOUR NAME — Git Workshop</title>
    <style>
      :root {
        /* ✏️ Change this to your favourite color */
        --accent: #58A6FF;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: monospace;
        background: #0D1117;
        color: #E6EDF3;
        min-height: 100vh;
        padding: 60px 24px;
      }

      .container {
        max-width: 560px;
        margin: 0 auto;
      }

      .back {
        display: inline-block;
        font-size: 0.82rem;
        color: #8B949E;
        text-decoration: none;
        margin-bottom: 40px;
        transition: color 0.15s;
      }

      .back:hover { color: var(--accent); }

      .card {
        background: #161B22;
        border: 1.5px solid var(--accent);
        border-radius: 12px;
        padding: 36px;
      }

      .avatar {
        font-size: 3rem;
        margin-bottom: 20px;
      }

      .name {
        font-size: 1.6rem;
        font-weight: 700;
        color: #E6EDF3;
        margin-bottom: 4px;
      }

      .role {
        font-size: 0.88rem;
        color: var(--accent);
        margin-bottom: 28px;
      }

      .divider {
        border: none;
        border-top: 1px solid #2D333B;
        margin: 24px 0;
      }

      .field {
        margin-bottom: 20px;
      }

      .field label {
        font-size: 0.72rem;
        color: #8B949E;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        display: block;
        margin-bottom: 6px;
      }

      .field p {
        font-size: 0.9rem;
        color: #E6EDF3;
        line-height: 1.6;
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 6px;
      }

      .tag {
        background: #21262D;
        border: 1px solid #2D333B;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 0.8rem;
        color: #8B949E;
      }

      .footer {
        margin-top: 32px;
        font-size: 0.78rem;
        color: #2D333B;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">

      <a class="back" href="index.html">← back to team</a>

      <div class="card">

        <!-- ✏️ Pick an emoji that represents you -->
        <div class="avatar">🙂</div>

        <!-- ✏️ Your name -->
        <div class="name">Your Name</div>

        <!-- ✏️ Your role -->
        <div class="role">// Your Role</div>

        <hr class="divider" />

        <div class="field">
          <label>About</label>
          <!-- ✏️ A sentence or two about yourself -->
          <p>Tell us something about yourself.</p>
        </div>

        <div class="field">
          <label>Fun fact</label>
          <!-- ✏️ Something fun or surprising -->
          <p>Something people might not know about you.</p>
        </div>

        <div class="field">
          <label>Tools I use</label>
          <!-- ✏️ Add or remove tags -->
          <div class="tag-list">
            <span class="tag">Figma</span>
            <span class="tag">Your tool</span>
          </div>
        </div>

        <div class="field">
          <label>First commit message</label>
          <!-- ✏️ What was your commit message in exercise 2? -->
          <p>"Add my name and bg color"</p>
        </div>

      </div>

      <div class="footer">made during the git workshop · Poatek Design Team</div>

    </div>
  </body>
</html>
